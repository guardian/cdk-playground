Parameters:
  YamlVpcId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    Default: /account/vpc/primary/id
    Description: Virtual Private Cloud to run EC2 instances within. Should NOT be the account default VPC.
  PrivateSubnets:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
    Default: /account/vpc/primary/subnets/private
    Description: A list of private subnets
  PublicSubnets:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
    Default: /account/vpc/primary/subnets/public
    Description: A list of public subnets
  DistributionBucketName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /account/services/artifact.bucket
    Description: SSM parameter containing the S3 bucket name holding distribution artifacts
  YamlLoggingStreamName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /account/services/logging.stream.name
    Description: SSM parameter containing the Name (not ARN) on the kinesis stream
  AMICdkplayground:
    Type: AWS::EC2::Image::Id
    Description: Amazon Machine Image ID for the app cdk-playground. Use this in conjunction with AMIgo to keep AMIs up to date.
  YamlAccessLoggingBucket:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /account/services/access-logging/bucket
    Description: S3 bucket to store your access logs
Resources:
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: cdk-playground.code.dev-gutools.co.uk
      Tags:
        - Key: App
          Value: cdk-playground
        - Key: gu:cdk:version
          Value: 63.2.0
        - Key: gu:repo
          Value: guardian/cdk-playground
        - Key: gu:riff-raff-project
          Value: devx::cdk-playground
        - Key: Name
          Value: CdkPlaygroundEc2-CODE/CertificateCdkplayground
        - Key: Stack
          Value: deploy
        - Key: Stage
          Value: CODE
      ValidationMethod: DNS
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
        Version: '2012-10-17'
      Path: /
      Tags:
        - Key: App
          Value: cdk-playground
        - Key: gu:cdk:version
          Value: 63.2.0
        - Key: gu:repo
          Value: guardian/cdk-playground
        - Key: gu:riff-raff-project
          Value: devx::cdk-playground
        - Key: Stack
          Value: deploy
        - Key: Stage
          Value: CODE
  SsmSshPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action:
              - ec2messages:AcknowledgeMessage
              - ec2messages:DeleteMessage
              - ec2messages:FailMessage
              - ec2messages:GetEndpoint
              - ec2messages:GetMessages
              - ec2messages:SendReply
              - ssm:UpdateInstanceInformation
              - ssm:ListInstanceAssociations
              - ssm:DescribeInstanceProperties
              - ssm:DescribeDocumentParameters
              - ssmmessages:CreateControlChannel
              - ssmmessages:CreateDataChannel
              - ssmmessages:OpenControlChannel
              - ssmmessages:OpenDataChannel
            Effect: Allow
            Resource: '*'
        Version: '2012-10-17'
      PolicyName: ssm-ssh-policy
      Roles:
        - !Ref InstanceRole
  DescribeEc2Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action:
              - autoscaling:DescribeAutoScalingInstances
              - autoscaling:DescribeAutoScalingGroups
              - ec2:DescribeTags
              - ec2:DescribeInstances
            Effect: Allow
            Resource: '*'
        Version: '2012-10-17'
      PolicyName: describe-ec2-policy
      Roles:
        - !Ref InstanceRole
  LogShippingPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action:
              - kinesis:Describe*
              - kinesis:Put*
            Effect: Allow
            Resource: !Join
              - ''
              - - 'arn:aws:kinesis:eu-west-1:'
                - !Ref AWS::AccountId
                - ':stream/'
                - !Ref YamlLoggingStreamName
        Version: '2012-10-17'
      PolicyName: LogShippingPolicy
      Roles:
        - !Ref InstanceRole
  GetDistributablePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action: s3:GetObject
            Effect: Allow
            Resource: !Join
              - ''
              - - 'arn:aws:s3:::'
                - !Ref DistributionBucketName
                - /deploy/CODE/cdk-playground/*
        Version: '2012-10-17'
      PolicyName: GetDistributablePolicy
      Roles:
        - !Ref InstanceRole
  ReadParamsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action: ssm:GetParametersByPath
            Effect: Allow
            Resource: !Join
              - ''
              - - 'arn:aws:ssm:eu-west-1:'
                - !Ref AWS::AccountId
                - ':parameter/CODE/deploy/cdk-playground'
          - Action:
              - ssm:GetParameters
              - ssm:GetParameter
            Effect: Allow
            Resource: !Join
              - ''
              - - 'arn:aws:ssm:eu-west-1:'
                - !Ref AWS::AccountId
                - ':parameter/CODE/deploy/cdk-playground/*'
        Version: '2012-10-17'
      PolicyName: parameter-store-read-policy
      Roles:
        - !Ref InstanceRole
  HttpsEgress:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all outbound HTTPS traffic
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          Description: Allow all outbound HTTPS traffic
          FromPort: 443
          IpProtocol: tcp
          ToPort: 443
      Tags:
        - Key: App
          Value: cdk-playground
        - Key: gu:cdk:version
          Value: 63.2.0
        - Key: gu:repo
          Value: guardian/cdk-playground
        - Key: gu:riff-raff-project
          Value: devx::cdk-playground
        - Key: Stack
          Value: deploy
        - Key: Stage
          Value: CODE
      VpcId: !Ref YamlVpcId
  LoadBalancerIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Load balancer to target
      FromPort: 9000
      GroupId: !GetAtt HttpsEgress.GroupId
      IpProtocol: tcp
      SourceSecurityGroupId: !GetAtt LoadBalancerSecurityGroup.GroupId
      ToPort: 9000
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        ImageId: !Ref AMICdkplayground
        InstanceType: t4g.micro
        MetadataOptions:
          HttpTokens: required
          InstanceMetadataTags: enabled
        Monitoring:
          Enabled: false
        SecurityGroupIds:
          - !GetAtt HttpsEgress.GroupId
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: App
                Value: cdk-playground
              - Key: gu:cdk:version
                Value: 63.2.0
              - Key: gu:repo
                Value: guardian/cdk-playground
              - Key: gu:riff-raff-project
                Value: devx::cdk-playground
              - Key: Name
                Value: CdkPlaygroundEc2-CODE/deploy-CODE-cdk-playground
              - Key: Stack
                Value: deploy
              - Key: Stage
                Value: CODE
          - ResourceType: volume
            Tags:
              - Key: App
                Value: cdk-playground
              - Key: gu:cdk:version
                Value: 63.2.0
              - Key: gu:repo
                Value: guardian/cdk-playground
              - Key: gu:riff-raff-project
                Value: devx::cdk-playground
              - Key: Name
                Value: CdkPlaygroundEc2-CODE/deploy-CODE-cdk-playground
              - Key: Stack
                Value: deploy
              - Key: Stage
                Value: CODE
        UserData: !Base64
          Fn::Join:
            - ''
            - - |-
                #!/bin/bash
                mkdir -p $(dirname '/cdk-playground/cdk-playground.deb')
                aws s3 cp 's3://
              - !Ref DistributionBucketName
              - |-
                /deploy/CODE/cdk-playground/cdk-playground.deb' '/cdk-playground/cdk-playground.deb'
                dpkg -i /cdk-playground/cdk-playground.deb
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: App
              Value: cdk-playground
            - Key: gu:cdk:version
              Value: 63.2.0
            - Key: gu:repo
              Value: guardian/cdk-playground
            - Key: gu:riff-raff-project
              Value: devx::cdk-playground
            - Key: Name
              Value: CdkPlaygroundEc2-CODE/deploy-CODE-cdk-playground
            - Key: Stack
              Value: deploy
            - Key: Stage
              Value: CODE
    DependsOn:
      - InstanceRole
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      HealthCheckGracePeriod: 120
      HealthCheckType: ELB
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MaxSize: '10'
      MetricsCollection:
        - Granularity: 1Minute
      MinSize: '1'
      Tags:
        - Key: App
          PropagateAtLaunch: true
          Value: cdk-playground
        - Key: gu:cdk:version
          PropagateAtLaunch: true
          Value: 63.2.0
        - Key: gu:repo
          PropagateAtLaunch: true
          Value: guardian/cdk-playground
        - Key: gu:riff-raff-project
          PropagateAtLaunch: true
          Value: devx::cdk-playground
        - Key: LogKinesisStreamName
          PropagateAtLaunch: true
          Value: !Ref YamlLoggingStreamName
        - Key: Stack
          PropagateAtLaunch: true
          Value: deploy
        - Key: Stage
          PropagateAtLaunch: true
          Value: CODE
        - Key: SystemdUnit
          PropagateAtLaunch: true
          Value: cdk-playground.service
      TargetGroupARNs:
        - !Ref Ec2TargetGroup
      VPCZoneIdentifier: !Ref PrivateSubnets
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: 'true'
        - Key: routing.http.x_amzn_tls_version_and_cipher_suite.enabled
          Value: 'true'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref YamlAccessLoggingBucket
        - Key: access_logs.s3.prefix
          Value: application-load-balancer/CODE/deploy/cdk-playground
      Scheme: internet-facing
      SecurityGroups:
        - !GetAtt LoadBalancerSecurityGroup.GroupId
      Subnets: !Ref PublicSubnets
      Tags:
        - Key: App
          Value: cdk-playground
        - Key: gu:cdk:version
          Value: 63.2.0
        - Key: gu:repo
          Value: guardian/cdk-playground
        - Key: gu:riff-raff-project
          Value: devx::cdk-playground
        - Key: Stack
          Value: deploy
        - Key: Stage
          Value: CODE
      Type: application
  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Automatically created Security Group for ELB CdkPlaygroundEc2CODELoadBalancerCdkplayground1F3A3E79
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          Description: Allow from anyone on port 443
          FromPort: 443
          IpProtocol: tcp
          ToPort: 443
      Tags:
        - Key: App
          Value: cdk-playground
        - Key: gu:cdk:version
          Value: 63.2.0
        - Key: gu:repo
          Value: guardian/cdk-playground
        - Key: gu:riff-raff-project
          Value: devx::cdk-playground
        - Key: Stack
          Value: deploy
        - Key: Stage
          Value: CODE
      VpcId: !Ref YamlVpcId
  LoadBalancerEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      Description: Load balancer to target
      DestinationSecurityGroupId: !GetAtt HttpsEgress.GroupId
      FromPort: 9000
      GroupId: !GetAtt LoadBalancerSecurityGroup.GroupId
      IpProtocol: tcp
      ToPort: 9000
  Ec2TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 10
      HealthCheckPath: /healthcheck
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 5
      Port: 9000
      Protocol: HTTP
      Tags:
        - Key: App
          Value: cdk-playground
        - Key: gu:cdk:version
          Value: 63.2.0
        - Key: gu:repo
          Value: guardian/cdk-playground
        - Key: gu:riff-raff-project
          Value: devx::cdk-playground
        - Key: Stack
          Value: deploy
        - Key: Stage
          Value: CODE
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
        - Key: stickiness.enabled
          Value: 'false'
      TargetType: instance
      UnhealthyThresholdCount: 2
      VpcId: !Ref YamlVpcId
  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - TargetGroupArn: !Ref Ec2TargetGroup
          Type: forward
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
  DNS:
    Type: Guardian::DNS::RecordSet
    Properties:
      Name: cdk-playground.code.dev-gutools.co.uk
      ResourceRecords:
        - !GetAtt LoadBalancer.DNSName
      RecordType: CNAME
      TTL: 3600
      Stage: CODE
